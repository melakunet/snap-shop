name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Run SwiftFormat (lint only)
        run: swiftformat . --lint

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Build & Test
        run: |
          set -o pipefail
          # Find the first available Apple Vision Pro simulator by UDID.
          # Using id= avoids passing 'variant=Designed for [iPad,iPhone]' on the
          # command line, where xcodebuild would split on the comma inside the brackets.
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for rt, devs in data.get('devices', {}).items():
              for d in devs:
                  if 'Apple Vision Pro' in d.get('name', '') and d.get('isAvailable', False):
                      print(d['udid'])
                      sys.exit(0)
          " 2>/dev/null || echo "")
          if [ -z "$UDID" ]; then
            echo "No Apple Vision Pro simulator found; available devices:"
            xcrun simctl list devices available | grep -v "^==" || true
            exit 1
          fi
          echo "Destination simulator: $UDID"
          xcodebuild test \
            -project 'Snap&Shop.xcodeproj' \
            -scheme 'Snap&Shop' \
            -destination "platform=visionOS Simulator,id=$UDID" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
